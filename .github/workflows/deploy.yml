name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Required for the deploy-pages action to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy when a new push arrives so we never
# serve a half-finished deploy
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # Upload only the app/ folder — keeps docs/, tests/, and node_modules
      # out of the public site entirely
      - name: Upload app/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
