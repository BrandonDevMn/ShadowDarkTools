name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

# Required for the deploy-pages action to publish to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Cancel any in-flight deploy when a new push arrives so we never
# serve a half-finished deploy
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # Inject the short commit SHA into the service worker cache name so that
      # every deploy gets a unique name. The activate handler then deletes the
      # previous deploy's cache automatically — no manual version bumping needed.
      - name: Stamp service worker with commit SHA
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          sed -i "s/DEPLOY_COMMIT_SHA/$SHORT_SHA/" app/service-worker.js

      # Inject the deploy datetime as the app version shown on the Settings tab.
      # Uses | as the sed delimiter so spaces and colons in the date don't need escaping.
      - name: Stamp app version with deploy datetime
        run: |
          DEPLOY_DATE=$(date -u '+%Y-%m-%d %H:%M UTC')
          sed -i "s|DEPLOY_DATETIME_PLACEHOLDER|$DEPLOY_DATE|" app/js/settings-page.js

      # Upload only the app/ folder — keeps docs/, tests/, and node_modules
      # out of the public site entirely
      - name: Upload app/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
