<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <!-- Dark parchment background with rounded corners matching iOS icon shape -->
  <rect width="180" height="180" rx="40" fill="#1a0f05"/>

  <!-- Outer flame — large amber glow -->
  <ellipse cx="90" cy="62" rx="28" ry="36" fill="#c85a00" opacity="0.6"/>

  <!-- Mid flame — bright orange -->
  <path d="M90 28
           C90 28 112 48 108 68
           C106 80 98 86 90 90
           C82 86 74 80 72 68
           C68 48 90 28 90 28Z"
        fill="#e8820a"/>

  <!-- Inner flame — hot yellow-white core -->
  <path d="M90 42
           C90 42 102 56 100 68
           C99 75 95 80 90 82
           C85 80 81 75 80 68
           C78 56 90 42 90 42Z"
        fill="#f5c842"/>

  <!-- Flame tip highlight -->
  <ellipse cx="90" cy="52" rx="6" ry="10" fill="#fff8e0" opacity="0.7"/>

  <!-- Torch handle — wooden shaft -->
  <rect x="82" y="88" width="16" height="52" rx="4" fill="#6b3d1a"/>

  <!-- Wood grain lines on handle -->
  <line x1="86" y1="94" x2="86" y2="134" stroke="#4a2a0f" stroke-width="1.5" opacity="0.5"/>
  <line x1="94" y1="94" x2="94" y2="134" stroke="#4a2a0f" stroke-width="1.5" opacity="0.5"/>

  <!-- Torch wrap / binding band -->
  <rect x="80" y="88" width="20" height="8" rx="2" fill="#8b5e2a"/>
  <rect x="80" y="100" width="20" height="4" rx="1" fill="#7a4f1e"/>
  <rect x="80" y="118" width="20" height="4" rx="1" fill="#7a4f1e"/>

  <!-- Handle end cap -->
  <rect x="83" y="136" width="14" height="6" rx="3" fill="#4a2a0f"/>

  <!-- Subtle flame glow on background -->
  <ellipse cx="90" cy="70" rx="36" ry="32" fill="#c85a00" opacity="0.08"/>
</svg>
