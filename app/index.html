<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <!--
    viewport-fit=cover extends content under the iPhone notch and home indicator.
    Without this, safe-area-inset-* values are always 0 and the notch area is wasted.
  -->
  <!--
    user-scalable=no disables pinch-to-zoom so the app feels native.
    iOS Safari ignores this in regular browser mode (accessibility), but
    respects it in standalone Add-to-Home-Screen mode — which is our target.
    maximum-scale=1 is a belt-and-suspenders fallback for other browsers.
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <!-- Enables full-screen mode when launched from the iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes" />

  <!--
    black-translucent lets app content render behind the notch area.
    The alternative "black" leaves a solid black bar — wastes screen real estate.
  -->
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

  <!-- Label shown under the icon on the iOS home screen -->
  <meta name="apple-mobile-web-app-title" content="ShadowDark" />

  <!-- 180×180px icon shown on the iOS home screen after "Add to Home Screen" -->
  <link rel="apple-touch-icon" sizes="180x180" href="./icons/apple-touch-icon.png" />

  <!-- PWA manifest — tells browsers this is an installable app -->
  <link rel="manifest" href="./manifest.json" />

  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/tab-bar.css" />

  <title>ShadowDark Tools</title>
</head>
<body>
  <!--
    .app-shell is a full-height flex column.
    .page-container fills the space between the status bar and the tab bar.
    #tab-bar is pinned at the bottom and handles its own safe-area padding.
  -->
  <div class="app-shell">
    <main class="page-container">
      <!-- All pages start hidden — app.js reveals the active one on load -->
      <div id="page-home"     class="page" hidden></div>
      <div id="page-dice"     class="page" hidden></div>
      <div id="page-generate" class="page" hidden></div>
      <div id="page-library"  class="page" hidden></div>
      <div id="page-settings" class="page" hidden></div>
    </main>

    <!--
      role="tablist" and aria-label make the tab bar readable to screen readers.
      Individual buttons get role="tab" and aria-selected from tab-bar.js.
    -->
    <nav id="tab-bar" class="tab-bar" role="tablist" aria-label="Main navigation"></nav>
  </div>

  <!--
    type="module" defers execution until after the DOM is parsed and also
    enables ES module imports. No need for an explicit defer attribute.
  -->
  <script type="module" src="./js/app.js"></script>
</body>
</html>
